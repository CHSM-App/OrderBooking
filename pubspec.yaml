name: order_booking_app
description: "Flutter application for order booking."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  flutter_secure_storage: ^9.2.4

  flutter_riverpod: ^2.4.9
  retrofit: ^4.4.1
  dio: ^5.7.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  shared_preferences: ^2.2.2
  http: ^1.1.0
  flutter_gen: ^5.10.0
  dropdown_search: ^5.0.5
  image_picker: ^1.0.4
  firebase_messaging: ^16.0.1
  firebase_auth: ^6.0.2
  firebase_core: ^4.1.0
  permission_handler: ^11.3.1
  url_launcher: ^6.2.5
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.2
  geolocator: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  # Code generation
  retrofit_generator: ^9.7.0
  json_serializable: ^6.8.0
  freezed: ^2.4.6
  build_runner: ^2.5.4

flutter:
  uses-material-design: true
  generate: true
  